<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1050" y1="0" x2="1050" y2="400"/>
  </g>

  <!-- Candlestick chart decoration (right side) -->
  <g opacity="0.15" transform="translate(750, 60)">
    <!-- Candle wicks -->
    <line x1="30" y1="20" x2="30" y2="120" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="80" y1="30" x2="80" y2="130" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="130" y1="50" x2="130" y2="140" stroke="#f87171" stroke-width="1.5"/>
    <line x1="180" y1="40" x2="180" y2="120" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="230" y1="20" x2="230" y2="110" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="280" y1="30" x2="280" y2="100" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="330" y1="10" x2="330" y2="90" stroke="#22d3ee" stroke-width="1.5"/>
    <!-- Candle bodies -->
    <rect x="20" y="50" width="20" height="50" fill="#22d3ee" rx="1"/>
    <rect x="70" y="60" width="20" height="45" fill="#22d3ee" rx="1"/>
    <rect x="120" y="80" width="20" height="40" fill="#f87171" rx="1"/>
    <rect x="170" y="55" width="20" height="45" fill="#22d3ee" rx="1"/>
    <rect x="220" y="45" width="20" height="40" fill="#22d3ee" rx="1"/>
    <rect x="270" y="48" width="20" height="35" fill="#22d3ee" rx="1"/>
    <rect x="320" y="35" width="20" height="40" fill="#22d3ee" rx="1"/>
  </g>

  <!-- Trend line overlay (right side) -->
  <polyline
    points="780,180 830,170 880,175 930,155 980,145 1030,135 1080,120 1130,105 1180,90"
    fill="none" stroke="url(#lineGrad)" stroke-width="2" opacity="0.5"/>
  <circle cx="1180" cy="90" r="4" fill="#22d3ee" opacity="0.6" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="120" width="3" height="160" fill="url(#accent)" rx="2"/>

  <!-- Main title -->
  <text x="108" y="185" font-family="'SF Mono', 'Fira Code', monospace" font-size="72" font-weight="700" letter-spacing="-2" fill="white">AutoTrader</text>

  <!-- Gradient underline -->
  <rect x="108" y="198" width="480" height="2" fill="url(#accent)" rx="1"/>

  <!-- Subtitle -->
  <text x="110" y="238" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="20" fill="#94a3b8" letter-spacing="0.5">AI-powered algorithmic trading for Indian equities</text>

  <!-- Tags -->
  <g transform="translate(110, 268)">
    <!-- Tag 1 -->
    <rect x="0" y="0" width="130" height="28" rx="14" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="65" y="18.5" font-family="'SF Mono', monospace" font-size="12" fill="#a5b4fc" text-anchor="middle">Multi-Agent AI</text>
    <!-- Tag 2 -->
    <rect x="146" y="0" width="118" height="28" rx="14" fill="#042f2e" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
    <text x="205" y="18.5" font-family="'SF Mono', monospace" font-size="12" fill="#67e8f9" text-anchor="middle">NSE / BSE Live</text>
    <!-- Tag 3 -->
    <rect x="280" y="0" width="128" height="28" rx="14" fill="#1a1a2e" stroke="#818cf8" stroke-width="1" opacity="0.8"/>
    <text x="344" y="18.5" font-family="'SF Mono', monospace" font-size="12" fill="#c7d2fe" text-anchor="middle">LangGraph FSM</text>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="370" x2="1120" y2="370" stroke="#1e293b" stroke-width="1"/>
  <text x="110" y="389" font-family="'SF Mono', monospace" font-size="11" fill="#334155">Built on TradingAgents v0.2.0 · Apache 2.0</text>
  <text x="1090" y="389" font-family="'SF Mono', monospace" font-size="11" fill="#334155" text-anchor="end">Python 3.11+</text>
</svg>
